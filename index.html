<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0a0c">
    <title>LEGEND • Roadside Triage</title>
    <link rel="manifest" href="manifest.json">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        :root {
            --primary: #ff2d55;
            --dark: #0a0a0c;
            --surface: #121214;
            --card: #1a1a1f;
            --text: #f1f1f3;
            --text-secondary: #a1a1aa;
        }
        
        * { box-sizing: border-box; }
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
            margin: 0;
            padding: 0;
            background: var(--dark);
            color: var(--text);
            line-height: 1.6;
        }
        
        .container {
            max-width: 820px;
            margin: 0 auto;
            padding: 16px;
        }
        
        header {
            text-align: center;
            padding: 32px 20px 24px;
        }
        
        .logo {
            font-family: 'Space Grotesk', system_ui, sans-serif;
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -1.5px;
            color: var(--primary);
        }
        
        .section {
            background: var(--surface);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid #27272a;
        }
        
        .safety {
            border-color: #ff2d55;
            background: #2a0a0f;
        }
        
        h2 {
            font-size: 1.35rem;
            margin: 0 0 16px;
            font-weight: 600;
        }
        
        .symptom-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
            gap: 12px;
        }
        
        .symptom-btn {
            background: var(--card);
            border: 1px solid #27272a;
            padding: 18px 14px;
            border-radius: 16px;
            font-size: 0.98rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }
        
        .lane {
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            border-left: 6px solid;
        }
        
        .lane.tow { border-left-color: #ff2d55; }
        .lane.shop { border-left-color: #f59e0b; }
        .lane.diy { border-left-color: #22c55e; }
        
        .vehicle-select {
            background: #111113;
            border: 1px solid #27272a;
            color: white;
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            margin-bottom: 12px;
        }
        
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 9999px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        
        .footer {
            text-align: center;
            padding: 30px 20px;
            color: #52525b;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">LEGEND</div>
            <p style="color:#a1a1aa; margin:4px 0 0;">Roadside Triage • Works Offline</p>
        </header>
        
        <!-- Safety Gate -->
        <div id="safety-gate" class="section safety">
            <h2 style="color:#ff2d55;">🚨 Safety First</h2>
            <p>Are you in a safe location off the road?</p>
            <button onclick="confirmSafety()" class="btn" style="background:#22c55e; margin-top:16px;">Yes, I'm Safe</button>
            <button onclick="showSafetyHelp()" style="background:transparent; color:#ff2d55; border:2px solid #ff2d55; margin-top:12px; padding:12px 24px; border-radius:9999px; cursor:pointer;">I need help moving</button>
        </div>
        
        <div id="main-app" style="display:none;">
            <!-- Active Vehicle -->
            <div class="section">
                <h2>🚗 Active Vehicle</h2>
                <select id="active-vehicle" class="vehicle-select" onchange="updateActiveVehicle()"></select>
                <button onclick="addNewVehicle()" class="btn" style="background:#27272a; color:white; border:1px solid #3f3f46; margin-top:8px;">+ Add New Vehicle</button>
            </div>
            
            <!-- Symptoms -->
            <div class="section">
                <h2>What's happening?</h2>
                <div class="symptom-grid">
                    <div class="symptom-btn" onclick="selectSymptom('shaking')">🌪️ Shaking</div>
                    <div class="symptom-btn" onclick="selectSymptom('nostart')">🔥 No-start</div>
                    <div class="symptom-btn" onclick="selectSymptom('overheat')">🌡️ Overheating</div>
                    <div class="symptom-btn" onclick="selectSymptom('deadbat')">🔋 Dead Battery</div>
                    <div class="symptom-btn" onclick="selectSymptom('flattire')">🛞 Flat Tire</div>
                    <div class="symptom-btn" onclick="selectSymptom('nocrank')">⚡ No Crank</div>
                </div>
            </div>
            
            <!-- Results -->
            <div id="results" style="display:none;">
                <button onclick="backToSymptoms()" class="btn" style="background:#27272a; margin-bottom:16px;">← Back</button>
                <div id="lanes-container"></div>
            </div>
            
            <!-- Get Help -->
            <div class="section">
                <h2>Need Help Now?</h2>
                <button class="btn" onclick="window.location.href='tel:911'" style="background:#ff2d55; margin-bottom:10px;">Call Emergency Services</button>
                <button class="btn" onclick="alert('In a real app this would show local tow options or your saved contacts.')" style="background:#27272a; border:1px solid #3f3f46;">Find Local Tow Help</button>
            </div>
        </div>
        
        <div class="footer">
            LEGEND • Realistic roadside help • Works offline
        </div>
    </div>

    <script>
        // Simple vehicle system
        let vehicles = JSON.parse(localStorage.getItem('legendVehicles') || '[]');
        let activeVehicleId = localStorage.getItem('activeVehicleId') || null;
        
        function saveVehicles() {
            localStorage.setItem('legendVehicles', JSON.stringify(vehicles));
            localStorage.setItem('activeVehicleId', activeVehicleId);
        }
        
        function updateActiveVehicleSelect() {
            const select = document.getElementById('active-vehicle');
            select.innerHTML = '';
            
            if (vehicles.length === 0) {
                const option = document.createElement('option');
                option.text = 'No vehicles saved';
                select.appendChild(option);
                return;
            }
            
            vehicles.forEach((v, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.text = `${v.year} ${v.make} ${v.model}`;
                if (activeVehicleId == index) option.selected = true;
                select.appendChild(option);
            });
        }
        
        function updateActiveVehicle() {
            const select = document.getElementById('active-vehicle');
            activeVehicleId = select.value;
            saveVehicles();
        }
        
        function addNewVehicle() {
            const year = prompt('Year (e.g. 2018):');
            const make = prompt('Make (e.g. Ford):');
            const model = prompt('Model (e.g. F-150):');
            if (year && make && model) {
                vehicles.push({year, make, model});
                activeVehicleId = vehicles.length - 1;
                saveVehicles();
                updateActiveVehicleSelect();
            }
        }
        
        // Load vehicles on start
        function loadVehicles() {
            if (vehicles.length === 0) {
                // Add example vehicle for realism
                vehicles.push({year: '2018', make: 'Ford', model: 'F-150'});
                activeVehicleId = 0;
                saveVehicles();
            }
            updateActiveVehicleSelect();
        }
        
        function confirmSafety() {
            document.getElementById('safety-gate').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            loadVehicles();
        }
        
        function showSafetyHelp() {
            alert('Move to safety first. Hazards on. Call for help if needed.');
        }
        
        const cases = {
            shaking: { name: "Shaking / Vibration", tow: { title: "🚨 TOW NOW", do: "Call tow immediately. Do not drive.", dont: "Drive at speed", why: "Risk of major mechanical failure." }, shop: { title: "🛠 SHOP SOON", do: "Book inspection soon.", dont: "Ignore", why: "Common causes: tires, CV joints, mounts." }, diy: { title: "🔧 BASIC DIY", do: "Check tire pressure and lugs.", dont: "Drive if bad", why: "Rules out simple tire issues." } },
            nostart: { name: "No-start", tow: { title: "🚨 TOW NOW", do: "Tow to shop.", dont: "Keep trying", why: "Could be timing or major failure." }, shop: { title: "🛠 SHOP SOON", do: "Diagnose soon.", dont: "Leave dead", why: "Battery, starter or sensor." }, diy: { title: "🔧 BASIC DIY", do: "Check battery terminals, try one jump.", dont: "Flood engine", why: "Simple electrical first." } },
            overheat: { name: "Overheating", tow: { title: "🚨 TOW NOW", do: "Shut off and tow.", dont: "Keep driving", why: "Engine damage risk." }, shop: { title: "🛠 SHOP SOON", do: "Inspect cooling system.", dont: "Drive far", why: "Cooling failure." }, diy: { title: "🔧 BASIC DIY", do: "Check coolant (cold engine).", dont: "Open hot cap", why: "Low coolant common." } },
            deadbat: { name: "Dead Battery", tow: { title: "🚨 TOW NOW", do: "Jump or tow.", dont: "Leave lights on", why: "Alternator or drain possible." }, shop: { title: "🛠 SHOP SOON", do: "Test battery & charging.", dont: "Ignore warnings", why: "Electrical issue likely." }, diy: { title: "🔧 BASIC DIY", do: "Clean terminals, check voltage.", dont: "Replace without testing", why: "Corrosion is #1 fix." } },
            flattire: { name: "Flat Tire", tow: { title: "🚨 TOW NOW", do: "Call tow if unsafe.", dont: "Drive on flat", why: "Damages rim." }, shop: { title: "🛠 SHOP SOON", do: "Repair professionally.", dont: "Use spare long term", why: "Proper fix needed." }, diy: { title: "🔧 BASIC DIY", do: "Change to spare if safe.", dont: "Attempt on busy road", why: "Most common fix." } },
            nocrank: { name: "No Crank", tow: { title: "🚨 TOW NOW", do: "Tow if no click.", dont: "Repeated attempts", why: "Starter or security issue." }, shop: { title: "🛠 SHOP SOON", do: "Diagnose starter/battery.", dont: "Ignore intermittent", why: "Starter often failing." }, diy: { title: "🔧 BASIC DIY", do: "Check battery, clean connections.", dont: "Bypass solenoid", why: "Battery/connections fix most." } }
        };
        
        function selectSymptom(key) {
            const data = cases[key];
            document.querySelector('#main-app > .section').style.display = 'none';
            document.getElementById('results').style.display = 'block';
            
            const container = document.getElementById('lanes-container');
            container.innerHTML = `
                <div class="lane tow"><h3>${data.tow.title}</h3><p><strong>DO:</strong> ${data.tow.do}</p><p><strong>DO NOT:</strong> ${data.tow.dont}</p><p style="color:#a1a1aa; font-size:0.9rem;">${data.tow.why}</p></div>
                <div class="lane shop"><h3>${data.shop.title}</h3><p><strong>DO:</strong> ${data.shop.do}</p><p><strong>DO NOT:</strong> ${data.shop.dont}</p><p style="color:#a1a1aa; font-size:0.9rem;">${data.shop.why}</p></div>
                <div class="lane diy"><h3>${data.diy.title}</h3><p><strong>DO:</strong> ${data.diy.do}</p><p><strong>DO NOT:</strong> ${data.diy.dont}</p><p style="color:#a1a1aa; font-size:0.9rem;">${data.diy.why}</p></div>
            `;
        }
        
        function backToSymptoms() {
            document.getElementById('results').style.display = 'none';
            document.querySelector('#main-app > .section').style.display = 'block';
        }
        
        window.onload = function() {
            // Auto load if needed
        };
    </script>
</body>
</html>
